<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPR-RIKEN WiL System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#00bfff,#0055aa);
    overflow:hidden;
}

/* พื้นหลัง */
.bg-text{
    position:fixed;
    width:200%;
    font-size:90px;
    font-weight:bold;
    color:white;
    opacity:0.1;
    transform:rotate(-25deg);
    animation:slide 20s linear infinite;
}

@keyframes slide{
    from{
        left:-50%;
        top:10%;
    }
    to{
        left:0%;
        top:70%;
    }
}

/* หน้า Login */
#loginPage{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:420px;
    background:white;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.35);
}

.logo{
    width:110px;
    height:110px;
    margin:auto;
    border-radius:50%;
    background:#0066cc;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    font-weight:bold;
    border:6px solid #00bfff;
}

.title{
    font-size:30px;
    font-weight:bold;
    color:#0066cc;
    margin-top:20px;
}

.company{
    font-size:20px;
    font-weight:bold;
    margin-top:10px;
}

.eng{
    font-size:20px;
    color:#555;
}

.wil{
    font-size:24px;
    color:#0066cc;
    font-weight:bold;
    margin:20px 0;
}

.text{
    margin-bottom:15px;
    font-size:18px;
}

input{
    width:90%;
    padding:14px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    width:95%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
    font-size:18px;
    font-weight:bold;
}

.login-btn{
    background:#0066cc;
}

.login-btn:hover{
    background:#004d99;
}

/* หน้าเมนู */
#menuPage{
    display:none;
    padding:30px;
}

.menu-box{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.menu-title{
    text-align:center;
    color:#0066cc;
    margin-bottom:20px;
}

.menu-box button{
    width:100%;
    margin-bottom:12px;
}

.b1{background:#007bff;}
.b2{background:#28a745;}
.b3{background:#ff9800;}
.b4{background:#6f42c1;}
.b5{background:#dc3545;}

.b1:hover,.b2:hover,.b3:hover,.b4:hover,.b5:hover{
    opacity:.9;
}

</style>
</head>

<body>

</div>

type="password"

placeholder="กรอกรหัสนักศึกษา">

</div>

</div>

</body>
</html>
