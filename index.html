<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NPR-RIKEN WiL System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
margin:0;
min-height:100vh;
background:linear-gradient(135deg,#00bfff,#0055aa);
}


.box{
background:white;
width:430px;
max-width:90%;
margin:50px auto;
padding:30px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px #333;
}


.logo{

width:100px;
height:100px;
background:#0066cc;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-size:35px;
font-weight:bold;

}


button{

width:95%;
padding:14px;
margin:8px;
border:none;
border-radius:10px;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;

}


.b1{background:#007bff}
.b2{background:#28a745}
.b3{background:#ff9800}
.b4{background:#6f42c1}
.b5{background:#dc3545}
.b6{background:#ff69b4}
.dash{background:#009688}
.logout{background:#333}



#menu,#dashboard{

display:none;

}



.card{

display:inline-block;
background:white;
padding:15px;
margin:8px;
border-radius:15px;
box-shadow:0 5px 15px #aaa;

}



.chart{

background:white;
padding:15px;
margin:20px 0;
border-radius:15px;

}


canvas{

max-height:300px;

}


</style>


</head>


<body>



<!-- LOGIN -->

<div id="login" class="box">


<div class="logo">
NPR
</div>


<h1>ระบบนักศึกษาฝึกงาน</h1>

<h2>บริษัท เอ็น พี อาร์ ริคเก้น</h2>

<h2>NPR-RIKEN</h2>

<h3>เด็กโครงการ WiL</h3>


<p>
กดปุ่มเข้าสู่ระบบเพื่อใช้งาน
</p>


<button class="b1" onclick="login()">
เข้าสู่ระบบ
</button>


</div>






<!-- MENU -->


<div id="menu" class="box">


<h1>
NPR-RIKEN WiL
</h1>


<button class="b1"
onclick="openLink('https://script.google.com/macros/s/AKfycbxv0pW43QGpMkGmq6iRQr9IeGy5AFCQs6ZAx0dMdnXVUNcugQQFkpB29O1mnhJlOqDv/exec')">

📌 ข้อมูลการเข้า-ออกงาน

</button>



<button class="b2"
onclick="openLink('https://docs.google.com/forms/d/e/1FAIpQLSem6u0f9WlZxEZ3G7JgR6XT2HGT1MIz1bBy4jcMdvC8EZc-ng/viewform')">

📝 กรอกข้อมูลการลา

</button>



<button class="b3">

📈 ดู % การทำงาน

</button>



<button class="b4">

⏱ ระบบคำนวณโอที

</button>



<button class="b5">

📋 รายงานข้อมูลการลา

</button>



<button class="b6"
onclick="openLink('https://script.google.com/macros/s/AKfycbw3OLhgHSnxjf0ZdYCYbHjAWZ0aGD12zszzHtKgKIcotKyu6lIFY0XK6Meg-yJt41Y/exec')">

🧧 รายงานสลิปเงินเดือน

</button>




<button class="dash"
onclick="showDash()">

📊 Dashboard สำหรับครู

</button>



<button class="logout" onclick="logout()">

🚪 ออกจากระบบ

</button>


</div>







<!-- DASHBOARD -->


<div id="dashboard" class="box">


<h1>
📊 Dashboard ครู
</h1>



<div class="card">
👨‍🎓 นักศึกษา
<br>
<b>50 คน</b>
</div>


<div class="card">
📅 วันทำงาน
<br>
<b>1100 วัน</b>
</div>


<div class="card">
⏱ OT
<br>
<b>350 ชม.</b>
</div>



<div class="card">
📝 ลา
<br>
<b>25 วัน</b>
</div>



<div class="card">
✅ % ทำงาน
<br>
<b>95%</b>
</div>





<div class="chart">

<h3>📌 การเข้า-ออกงาน</h3>

<canvas id="workChart"></canvas>

</div>





<div class="chart">

<h3>⏱ OT นักศึกษา</h3>

<canvas id="otChart"></canvas>

</div>






<div class="chart">

<h3>📝 การลา</h3>

<canvas id="leaveChart"></canvas>

</div>







<div class="chart">

<h3>📈 % การทำงาน</h3>

<canvas id="percentChart"></canvas>

</div>





<button class="logout" onclick="back()">

⬅ กลับเมนู

</button>


</div>







<script>


function login(){

localStorage.setItem(
"login",
"success"
);


document.getElementById("login").style.display="none";

document.getElementById("menu").style.display="block";


}



window.onload=function(){


if(localStorage.getItem("login")=="success"){

document.getElementById("login").style.display="none";

document.getElementById("menu").style.display="block";

}

}





function openLink(url){

window.open(url,"_blank");

}





function logout(){

localStorage.removeItem("login");

location.reload();

}




function showDash(){

document.getElementById("menu").style.display="none";

document.getElementById("dashboard").style.display="block";


createChart();


}




function back(){

document.getElementById("dashboard").style.display="none";

document.getElementById("menu").style.display="block";

}




function createChart(){



new Chart(workChart,{

type:"bar",

data:{

labels:["จ","อ","พ","พฤ","ศ"],

datasets:[{

label:"นักศึกษาเข้า",

data:[48,50,47,49,50]

}]

}

});





new Chart(otChart,{

type:"bar",

data:{

labels:["OT1.5","OT2","OT3"],

datasets:[{

label:"ชั่วโมง",

data:[250,80,20]

}]

}

});






new Chart(leaveChart,{

type:"pie",

data:{

labels:["ลากิจ","ลาป่วย","ขาด"],

datasets:[{

data:[15,8,2]

}]

}

});







new Chart(percentChart,{

type:"line",

data:{

labels:["ม.ค.","ก.พ.","มี.ค.","เม.ย."],

datasets:[{

label:"% ทำงาน",

data:[90,93,95,97]

}]

}

});




}



</script>



</body>
</html>
